syntax = "proto3";

package roammand.v1;

option go_package = "github.com/MisakiHCL/roammand/gen/go/roammand/v1;roammandv1";

enum SessionDescriptionType {
  SESSION_DESCRIPTION_TYPE_UNSPECIFIED = 0;
  SESSION_DESCRIPTION_TYPE_OFFER = 1;
  SESSION_DESCRIPTION_TYPE_ANSWER = 2;
}

message WebRtcSessionDescription {
  SessionDescriptionType type = 1;
  string sdp = 2;
  bytes dtls_fingerprint_sha256 = 3;
}

message IceCandidate {
  string candidate = 1;
  string sdp_mid = 2;
  uint32 sdp_m_line_index = 3;
}

message EndOfCandidates {}

message WebRtcNegotiation {
  bytes session_id = 1;
  oneof payload {
    WebRtcSessionDescription description = 2;
    IceCandidate ice_candidate = 3;
    EndOfCandidates end_of_candidates = 4;
  }
}
