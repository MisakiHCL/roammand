syntax = "proto3";

package roammand.v1;

option go_package = "github.com/MisakiHCL/roammand/gen/go/roammand/v1;roammandv1";

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_PAIRING_CODE_EXPIRED = 1;
  ERROR_CODE_PAIRING_RATE_LIMITED = 2;
  ERROR_CODE_PAIRING_REJECTED = 3;
  ERROR_CODE_DEVICE_OFFLINE = 4;
  ERROR_CODE_DEVICE_BUSY = 5;
  ERROR_CODE_AUTH_INVALID = 6;
  ERROR_CODE_AUTH_REVOKED = 7;
  ERROR_CODE_SESSION_REPLAYED = 8;
  ERROR_CODE_ICE_FAILED = 9;
  ERROR_CODE_TURN_UNAVAILABLE = 10;
  ERROR_CODE_CODEC_NEGOTIATION_FAILED = 11;
  ERROR_CODE_CAPTURE_PERMISSION_REQUIRED = 12;
  ERROR_CODE_INPUT_PERMISSION_REQUIRED = 13;
  ERROR_CODE_CAPTURE_FAILED = 14;
  ERROR_CODE_INPUT_INJECTION_FAILED = 15;
  ERROR_CODE_APP_MOVED_TO_BACKGROUND = 16;
  ERROR_CODE_INVALID_REQUEST = 17;
  ERROR_CODE_PROTOCOL_UNSUPPORTED = 18;
  ERROR_CODE_MESSAGE_TOO_LARGE = 19;
  ERROR_CODE_SERVER_UNAVAILABLE = 20;
  ERROR_CODE_PRIVILEGED_BRIDGE_UNAVAILABLE = 21;
  ERROR_CODE_PRIVILEGED_CLIENT_UNTRUSTED = 22;
  ERROR_CODE_PRIVILEGED_LEASE_EXPIRED = 23;
  ERROR_CODE_SECURE_ATTENTION_UNAVAILABLE = 24;
  ERROR_CODE_LOCAL_EMERGENCY_STOP = 25;
}

message RetryAfterDetails {
  uint64 retry_after_ms = 1;
}

message PermissionDetails {
  string permission = 1;
}

message CodecDetails {
  repeated string supported_codecs = 1;
}

message TransportDetails {
  string transport = 1;
}

message UnifiedError {
  ErrorCode code = 1;
  string message_key = 2;
  bool retryable = 3;
  string request_id = 4;
  oneof details {
    RetryAfterDetails retry_after = 10;
    PermissionDetails permission = 11;
    CodecDetails codec = 12;
    TransportDetails transport = 13;
  }
}
