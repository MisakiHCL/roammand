[package]
name = "roammand-protocol"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[dependencies]
aes-gcm = "0.10.3"
hkdf = "0.12.4"
prost = "0.14.4"
sha2 = "0.10.9"
x25519-dalek = { version = "2.0.1", features = ["static_secrets"] }

[dev-dependencies]
hex = "0.4.3"
proptest = "1.6.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
