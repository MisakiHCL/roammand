version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      rust-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /services/signaling
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      signaling-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /gen/go
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    groups:
      generated-go-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: pub
    directory: /apps/client_flutter
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      flutter-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: pub
    directory: /gen/dart
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    groups:
      generated-dart-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directories:
      - /services/signaling
      - /infra/compose
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    groups:
      container-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
