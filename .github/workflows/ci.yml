name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  COCOAPODS_VERSION: 1.16.2

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundary-and-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: 1.69.0
          github_token: ${{ github.token }}
      - name: Check public boundary
        run: ./scripts/check_public_boundary.sh
      - name: Check README contract
        run: ./scripts/check_readme_contract.sh
      - name: Check schema formatting
        run: buf format --diff --exit-code
      - name: Lint schema
        run: buf lint
      - name: Build schema
        run: buf build
      - name: Check schema contract
        run: ./scripts/check_schema_contract.sh
      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#commit=${{ github.event.pull_request.base.sha }}"
      - name: Check generated protocol code
        run: make generate-check
      - name: Confirm generated tree is clean
        run: git diff --exit-code -- gen

  dart:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true
      - name: Install locked CocoaPods
        if: runner.os == 'macOS'
        shell: bash
        run: |
          gem_root="$RUNNER_TEMP/cocoapods-$COCOAPODS_VERSION"
          mkdir -p "$gem_root/bin"
          GEM_HOME="$gem_root" GEM_PATH="$gem_root" gem install cocoapods \
            --version "$COCOAPODS_VERSION" --install-dir "$gem_root" \
            --bindir "$gem_root/bin" --no-document
          "$gem_root/bin/pod" --version
          printf 'GEM_HOME=%s\nGEM_PATH=%s\n' "$gem_root" "$gem_root" >> "$GITHUB_ENV"
          printf '%s/bin\n' "$gem_root" >> "$GITHUB_PATH"
      - name: Resolve protocol packages
        working-directory: gen/dart
        run: dart pub get --enforce-lockfile
      - name: Resolve client packages
        working-directory: apps/client_flutter
        run: flutter pub get --enforce-lockfile
      - name: Check formatting
        run: |
          dart format --output=none --set-exit-if-changed scripts/validate_m4_smoke_config.dart
          cd gen/dart && dart format --output=none --set-exit-if-changed lib test
          cd ../../apps/client_flutter && dart format --output=none --set-exit-if-changed lib test tool
      - name: Check M4 smoke configuration contract
        shell: bash
        run: make test-m4-config
      - name: Check M5 smoke contract
        shell: bash
        run: make test-m5-config
      - name: Check M6 smoke contract
        shell: bash
        run: make test-m6-config
      - name: Analyze and test protocol
        working-directory: gen/dart
        run: dart analyze && dart test
      - name: Analyze and test client
        working-directory: apps/client_flutter
        run: flutter analyze --no-pub && flutter test --no-pub
      - name: Build macOS Controller
        if: runner.os == 'macOS'
        working-directory: apps/client_flutter
        run: flutter build macos --debug --no-pub
      - name: Build Windows Controller
        if: runner.os == 'Windows'
        working-directory: apps/client_flutter
        run: flutter build windows --debug --no-pub
      - name: Confirm generated files and dependency locks are unchanged
        run: git diff --exit-code -- gen/dart/pubspec.lock apps/client_flutter/pubspec.lock apps/client_flutter/lib/l10n/generated apps/client_flutter/ios/Podfile.lock apps/client_flutter/macos/Podfile.lock

  mobile-builds:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: flutter build ios --simulator --debug --no-pub
          - os: ubuntu-latest
            command: flutter build apk --debug --no-pub
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true
      - name: Install locked CocoaPods
        if: runner.os == 'macOS'
        shell: bash
        run: |
          gem_root="$RUNNER_TEMP/cocoapods-$COCOAPODS_VERSION"
          mkdir -p "$gem_root/bin"
          GEM_HOME="$gem_root" GEM_PATH="$gem_root" gem install cocoapods \
            --version "$COCOAPODS_VERSION" --install-dir "$gem_root" \
            --bindir "$gem_root/bin" --no-document
          "$gem_root/bin/pod" --version
          printf 'GEM_HOME=%s\nGEM_PATH=%s\n' "$gem_root" "$gem_root" >> "$GITHUB_ENV"
          printf '%s/bin\n' "$gem_root" >> "$GITHUB_PATH"
      - name: Resolve protocol packages
        working-directory: gen/dart
        run: dart pub get --enforce-lockfile
      - name: Resolve client packages
        working-directory: apps/client_flutter
        run: flutter pub get --enforce-lockfile
      - name: Check M6 mobile lifecycle
        shell: bash
        run: make test-m6-lifecycle
      - name: Build mobile client
        working-directory: apps/client_flutter
        run: ${{ matrix.command }}
      - name: Confirm generated files and dependency locks are unchanged
        run: git diff --exit-code -- gen/dart/pubspec.lock apps/client_flutter/pubspec.lock apps/client_flutter/lib/l10n/generated apps/client_flutter/ios/Podfile.lock apps/client_flutter/macos/Podfile.lock

  desktop-host:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt,clippy
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/roammand/libwebrtc
          key: libwebrtc-${{ runner.os }}-${{ hashFiles('scripts/libwebrtc-assets.sha256') }}
      - name: Verify native WebRTC asset lock
        shell: bash
        run: make check-libwebrtc
      - name: Lint desktop Host crates
        run: cargo clippy --locked -p roammand-host-platform -p roammand-ipc -p roammand-host-agent --all-targets -- -D warnings
      - name: Test desktop Host crates
        run: cargo test --locked -p roammand-host-platform -p roammand-ipc -p roammand-host-agent
      - name: Test native desktop WebRTC
        shell: bash
        run: make test-native-webrtc
      - name: Confirm Cargo lock is unchanged
        run: git diff --exit-code -- Cargo.lock

  m8-privileged-bridge:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt,clippy
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true
      - name: Resolve Flutter dependencies
        working-directory: apps/client_flutter
        run: flutter pub get --enforce-lockfile
      - name: Test bridge core and platform contracts
        run: cargo test --locked -p roammand-privileged-bridge
      - name: Lint bridge platform code
        run: cargo clippy --locked -p roammand-privileged-bridge --all-targets -- -D warnings
      - name: Test status, tray, and emergency stop
        working-directory: apps/client_flutter
        run: flutter test --no-pub test/privileged_bridge_presenter_test.dart test/host_status_page_test.dart test/host_tray_controller_test.dart test/desktop_app_root_test.dart
      - name: Check M8 privacy boundary
        shell: bash
        run: ./scripts/check_m8_privacy.sh
      - name: Check macOS package dry-run
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/test_m8_macos_package.sh
      - name: Check macOS release compliance generation
        if: runner.os == 'macOS'
        shell: bash
        run: |
          validator_venv="$RUNNER_TEMP/roammand-spdx-tools"
          python3 -m venv "$validator_venv"
          "$validator_venv/bin/python" -m pip install \
            --disable-pip-version-check \
            --no-input \
            spdx-tools==0.8.5
          ROAMMAND_SPDX_TOOLS_PYTHON="$validator_venv/bin/python" \
            ./scripts/test_macos_release_compliance.sh
      - name: Check Windows package and WhatIf
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/test_m8_windows_package.sh
      - name: Confirm generated files and dependency locks are unchanged
        run: git diff --exit-code -- Cargo.lock apps/client_flutter/pubspec.lock apps/client_flutter/lib/l10n/generated apps/client_flutter/ios/Podfile.lock apps/client_flutter/macos/Podfile.lock

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt,clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked --workspace
      - name: Confirm Cargo lock is unchanged
        run: git diff --exit-code -- Cargo.lock

  go:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOFLAGS: -mod=readonly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache-dependency-path: |
            gen/go/go.sum
            services/signaling/go.sum
      - name: Check formatting
        run: ./scripts/check_go_format.sh
      - name: Vet and test protocol
        working-directory: gen/go
        run: go mod verify && go vet ./... && go test ./...
      - name: Vet and test signaling
        working-directory: services/signaling
        run: go mod verify && go vet ./... && go test ./...
      - name: Race-test signaling
        working-directory: services/signaling
        run: go test -race ./...
      - name: Confirm Go module files are unchanged
        run: git diff --exit-code -- gen/go/go.mod gen/go/go.sum services/signaling/go.mod services/signaling/go.sum

  m7-recovery-privacy-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOFLAGS: -mod=readonly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache-dependency-path: |
            gen/go/go.sum
            services/signaling/go.sum
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.0
      - name: Resolve Flutter dependencies from the lockfile
        working-directory: apps/client_flutter
        run: flutter pub get --enforce-lockfile
      - name: Check authenticated reconnect
        run: make test-m7-reconnect
      - name: Check privacy-safe diagnostics and logging
        run: make test-m7-privacy
      - name: Fuzz and property-test untrusted inputs
        run: make test-m7-fuzz
      - name: Confirm dependency locks are unchanged
        run: git diff --exit-code -- Cargo.lock apps/client_flutter/pubspec.lock gen/go/go.mod gen/go/go.sum services/signaling/go.mod services/signaling/go.sum

  self-hosting:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ci-tools
      - name: Prepare ephemeral Compose fixture secrets
        run: |
          mkdir -p infra/compose/secrets
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -subj "/CN=localhost" \
            -keyout infra/compose/secrets/tls-key.pem \
            -out infra/compose/secrets/tls-cert.pem
          sudo chown "$(id -un)":65532 infra/compose/secrets/*
          chmod 640 infra/compose/secrets/*
      - name: Validate self-hosted Compose
        run: make test-m7-config
