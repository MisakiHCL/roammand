name: Setup CI tools
description: Install command-line tools required by repository checks

runs:
  using: composite
  steps:
    - name: Install ripgrep on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if ! command -v rg >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
        fi

    - name: Install ripgrep on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        if ! command -v rg >/dev/null 2>&1; then
          brew install ripgrep
        fi

    - name: Install ripgrep on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (-not (Get-Command rg -ErrorAction SilentlyContinue)) {
          choco install ripgrep --yes --no-progress
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
        }

    - name: Verify ripgrep
      shell: bash
      run: rg --version
